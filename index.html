<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thana Studios | Cultivating the Infinite</title>
    <style>
        :root {
            --gold: #c5a059;
            --gold-bright: #ffd700;
            --cyan: #00ffcc;
            --deep-bg: #030303;
            --glass: rgba(20, 20, 20, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--deep-bg);
            color: #f0f0f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-bright);
            font-size: 1.2rem;
        }

        /* Hero Section */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #030303 100%);
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            letter-spacing: -2px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 40%, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: 15px;
            font-weight: 300;
        }

        /* Philosophy Section */
        .intro {
            max-width: 800px;
            margin: -100px auto 100px;
            padding: 60px 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .intro h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .intro p { font-size: 1.2rem; color: #bbb; }

        /* Projects Grid */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
